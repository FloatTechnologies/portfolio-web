name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & publish to omerxhafique.github.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build:pages
        env:
          NEXT_PUBLIC_SITE_URL: https://omerxhafique.github.io

      - run: touch out/.nojekyll

      - name: Push static site to user Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
          external_repository: omerxhafique/omerxhafique.github.io
          publish_branch: main
          publish_dir: ./out
          commit_message: "Deploy portfolio from ${{ github.repository }}@${{ github.sha }}"
